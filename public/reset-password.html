<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">
    <title>KabuTech - Reset Password</title>
    <meta name="theme-color" content="#004521">
    
    <!-- Fonts -->
    <link href="./assets/plus-jakarta-sans.css" rel="stylesheet">
    <link href="./assets/material-symbols.css" rel="stylesheet">
    <!-- Tailwind CSS -->
    <link href="./assets/tailwind-compiled.css" rel="stylesheet">
    <link href="./css/app.css" rel="stylesheet">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth-compat.js"></script>

    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(0, 69, 33, 0.15);
        }
        .dark .glass-card {
            background: rgba(24, 24, 27, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .auth-input {
            width: 100% !important;
            min-width: 0 !important;
            display: block;
        }
    </style>

    <script>
        // Apply saved theme automatically to prevent white flash in dark mode
        const savedTheme = localStorage.getItem('kb_theme_pref');
        if (savedTheme === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>

<body class="bg-[#f4f9f4] dark:bg-zinc-950 text-slate-800 dark:text-zinc-200 antialiased min-h-screen flex items-center justify-center">

    <!-- Decorative background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] bg-[#adf2bc] dark:bg-emerald-900/20 rounded-full blur-[100px] opacity-50"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] bg-primary dark:bg-emerald-800/20 rounded-full blur-[100px] opacity-30"></div>
    </div>

    <!-- Main Card -->
    <div class="w-full min-h-screen glass-card p-8 flex flex-col items-center justify-center relative z-10 auth-card-animate shadow-xl" id="reset-content">
        <div class="w-full max-w-md">
        <!-- Logo Header -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-16 h-16 rounded-2xl bg-primary text-white flex items-center justify-center shadow-lg shadow-primary/30 mb-4">
                <span class="material-symbols-outlined text-[36px]" style="font-variation-settings: 'FILL' 1;">eco</span>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-900 dark:text-white text-center">Reset Password</h1>
            <p class="text-[13px] text-slate-500 dark:text-zinc-400 mt-2 text-center px-4">Create a new, secure password for your KabuTech account.</p>
        </div>

        <div id="reset-error" class="hidden w-full bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800/50 text-red-600 dark:text-red-400 rounded-xl px-4 py-3 flex items-start gap-2 text-[13px] font-semibold mb-6 shadow-sm">
            <span class="material-symbols-outlined text-[20px] shrink-0">error</span>
            <span id="reset-error-text"></span>
        </div>

        <form id="reset-form" onsubmit="handleResetPassword(event)" class="space-y-5">
            
            <div class="flex flex-col gap-2">
                <label class="text-[11px] font-bold text-slate-500 dark:text-zinc-400 uppercase tracking-wide">New Password</label>
                <div class="relative w-full">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[20px] text-slate-400 dark:text-zinc-500">lock</span>
                    <input id="new-password" type="password" required minlength="6"
                        class="auth-input bg-white dark:bg-zinc-800/50 border border-slate-200 dark:border-zinc-700/50 rounded-2xl py-3.5 pl-[46px] pr-4 text-[14px] text-slate-800 dark:text-zinc-200 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none"
                        placeholder="Min. 6 characters">
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-[11px] font-bold text-slate-500 dark:text-zinc-400 uppercase tracking-wide">Confirm Password</label>
                <div class="relative w-full">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-[20px] text-slate-400 dark:text-zinc-500">lock_reset</span>
                    <input id="confirm-password" type="password" required
                        class="auth-input bg-white dark:bg-zinc-800/50 border border-slate-200 dark:border-zinc-700/50 rounded-2xl py-3.5 pl-[46px] pr-4 text-[14px] text-slate-800 dark:text-zinc-200 focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none"
                        placeholder="Re-type new password">
                </div>
            </div>

            <button id="btn-reset" type="submit" class="w-full bg-primary hover:bg-[#00381b] flex items-center justify-center gap-2 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] mt-2">
                Update Password
            </button>
        </form>
        </div>
    </div>

    <script>
        // Initialize Firebase securely utilizing your exact API credentials
        const fbConfig = {
            apiKey: "AIzaSyA3rB7rKIrfdJzCnFdnGvk25n0rd_hHI7M",
            authDomain: "kabutech-hiyas.firebaseapp.com",
            databaseURL: "https://kabutech-hiyas-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "kabutech-hiyas",
            storageBucket: "kabutech-hiyas.firebasestorage.app",
            messagingSenderId: "528459633948",
            appId: "1:528459633948:web:77f88776ee7366827cd6d9",
            measurementId: "G-T4NCN14Z4D"
        };
        firebase.initializeApp(fbConfig);
        const auth = firebase.auth();

        // Safety boot sequence: Immediately read URL parameters to verify action
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('oobCode');
            const mode = urlParams.get('mode');

            if (!code || mode !== 'resetPassword') {
                showErrorState("Invalid or expired reset link. Please request a new password reset from the KabuTech app.");
            } else {
                window.oobCode = code;
                
                // Pre-verify the token against Firebase servers to catch expired links instantly
                auth.verifyPasswordResetCode(code).then((email) => {
                    console.log("Token verified for: " + email);
                }).catch((error) => {
                    showErrorState("This reset link has expired or was already used.");
                });
            }
        });

        function showErrorState(message) {
            document.getElementById('reset-content').innerHTML = `
                <div class="w-full max-w-md flex flex-col items-center text-center py-6">
                    <span class="material-symbols-outlined text-[64px] text-red-500 mb-6 drop-shadow-md" style="font-variation-settings: 'FILL' 1;">error</span>
                    <h2 class="text-2xl font-extrabold text-slate-900 dark:text-white mb-3">Invalid Link</h2>
                    <p class="text-[14px] text-slate-500 dark:text-zinc-400 mb-8 max-w-[280px]">` + message + `</p>
                    <a href="./index.html" class="w-full bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3.5 rounded-xl shadow-lg transition-all active:scale-[0.98]">
                        Return to Login
                    </a>
                </div>
            `;
        }

        function handleResetPassword(e) {
            e.preventDefault();
            const pass = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            const errorEl = document.getElementById('reset-error');
            const errorText = document.getElementById('reset-error-text');
            const btn = document.getElementById('btn-reset');
            
            errorEl.classList.add('hidden');

            if (pass.length < 6) {
                errorText.textContent = "Password must be at least 6 characters.";
                errorEl.classList.remove('hidden');
                return;
            }
            if (pass !== confirm) {
                errorText.textContent = "Passwords do not match.";
                errorEl.classList.remove('hidden');
                return;
            }

            // Show loading state
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[20px]">progress_activity</span> Updating...';
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btn.disabled = true;

            auth.confirmPasswordReset(window.oobCode, pass)
                .then(() => {
                    // Success State
                    document.getElementById('reset-content').innerHTML = `
                        <div class="w-full max-w-md flex flex-col items-center text-center py-6 auth-card-animate">
                            <div class="w-20 h-20 rounded-full bg-green-50 dark:bg-green-900/30 flex items-center justify-center mb-6 shadow-sm border border-green-100 dark:border-green-800">
                                <span class="material-symbols-outlined text-[42px] text-primary dark:text-green-400" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                            </div>
                            <h2 class="text-2xl font-extrabold text-slate-900 dark:text-white mb-3">Password Updated!</h2>
                            <p class="text-[14px] text-slate-500 dark:text-zinc-400 mb-8 max-w-[280px]">Your password has been successfully reset. You can now log into your farm operations dashboard.</p>
                            <a href="./index.html" class="w-full bg-primary hover:bg-[#00381b] text-white font-bold py-3.5 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                                Return to Login
                            </a>
                        </div>
                    `;
                })
                .catch((error) => {
                    // Revert to form
                    errorText.textContent = error.message;
                    errorEl.classList.remove('hidden');
                    btn.textContent = "Update Password";
                    btn.classList.remove('opacity-80', 'cursor-not-allowed');
                    btn.disabled = false;
                });
        }
    </script>
</body>
</html>
